name: Food Price Monitor

on:
  schedule:
    # 每天北京时间 08:00 执行（约 UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:  # 支持手动触发
  push:
    paths:
      - "scripts/food_price_scraper.py"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # 必须开启写权限才能 push 回仓库

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install xlrd==1.2.0 requests

      - name: Discover latest 郴州 report URL
        id: discover
        run: |
          python -c "
import requests, re, os
headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
url = (
    'https://www.bing.com/search?q='
    'site%3Acif.mofcom.gov.cn+%E9%83%BD%E5%B7%9E+%E7%94%9F%E6%B4%BB%E5%BF%85%E9%9C%81%E5%93%81+%E6%83%85%E5%86%B5%E5%88%86%E6%9E%90+2026'
)
try:
    r = requests.get(url, headers=headers, timeout=15)
    matches = re.findall(
        r'href=\"(https?://cif\.mofcom\.gov\.cn/cif/html/market_scanner/\d+/\d+/\d+\.html)\"',
        r.text
    )
    if matches:
        print(f'Found: {matches[0]}')
        with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f'CHENZHOU_REPORT_URL={matches[0]}\n')
    else:
        print('No 郴州 report URL found via search')
except Exception as e:
    print(f'Search failed: {e}')
"
        shell: python

      - name: Run scraper
        run: python scripts/food_price_scraper.py
        env:
          CHENZHOU_REPORT_URL: ${{ env.CHENZHOU_REPORT_URL }}

      - name: Check for changes
        id: changed
        run: |
          if git diff --exit-code data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price data changed!"
          fi

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: update food prices $(date '+%Y-%m-%d')"
          git push
